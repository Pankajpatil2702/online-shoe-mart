<div class="container py-5">

  <h2 class="text-center mb-4">Our Products 👟</h2>

  <div class="row">

    <div class="col-md-4 mb-4" *ngFor="let product of products">
      <div class="card shadow h-100">

        <img [src]="product.image"
             class="card-img-top"
             alt="Product Image">

        <div class="card-body text-center">

          <h5 class="card-title">{{ product.name }}</h5>
          <h6 class="text-primary">₹{{ product.price }}</h6>

          <button class="btn btn-dark w-100 mb-2"
                  (click)="addToCart(product)">
            Add to Cart
          </button>

          <button class="btn btn-warning w-100"
                  (click)="buyNow(product)">
            Buy Now
          </button>

        </div>

      </div>
    </div>

  </div>
</div>

<!-- ABOUT SECTION -->
<section class="py-5">
  <div class="container text-center">
    <h2>Why Choose Us?</h2>
    <p class="mt-3">
      We provide high-quality footwear with the latest designs and best comfort.
      Trusted by thousands of happy customers.
    </p>
  </div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3">
  <p class="mb-0">© 2026 Footwear Store | All Rights Reserved</p>
</footer>
