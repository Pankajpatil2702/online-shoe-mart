<div class="container mt-5">
  <div class="card shadow-lg p-4 border-0 product-card">

    <div class="row pt-3">
      <h3 class="text-center text-primary fw-bold">
        Product Details of {{product.title}}
      </h3>
      <hr>

      <!-- Product Image -->
      <div class="col-lg-5 text-center">
        <img [src]="product.image" class="img-fluid product-img">
      </div>

      <!-- Product Details -->
      <div class="col-lg-7 p-4">

        <h3 class="text-success fw-bold">{{product.title}}</h3>

        <span class="badge bg-warning text-dark mb-2">
          {{product.category}}
        </span>

        <h4 class="text-danger fw-bold mt-3">
          ₹ {{product.price}}
        </h4>

        <p class="text-muted mt-3">
          {{product.description}}
        </p>

        <!-- Quantity -->
        <div class="qty-box mt-4">

          <button class="btn btn-danger px-3" (click)="remove()"> - </button>

          <input type="number"
                 class="form-control text-center mx-2 qty-input"
                 [(ngModel)]="qty">

          <button class="btn btn-success px-3" (click)="add()"> + </button>

        </div>

        <br>

        <button class="btn btn-primary btn-lg add-cart-btn"
                (click)="addToCart()">
          🛒 Add To Cart
        </button>

      </div>
    </div>

  </div>
</div>
